name: Update RAG Data

on:
  schedule:
    # 每月1号 UTC 02:00 自动运行
    - cron: '0 2 1 * *'
  workflow_dispatch:
    inputs:
      skip_upload:
        description: '仅爬取和处理数据，跳过上传到 Cloudflare'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write

jobs:
  update-rag:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 sentence-transformers numpy

      - name: Scrape government documentation
        run: python scripts/scrape-gov-docs.py

      - name: Prepare RAG chunks
        run: python scripts/prepare_rag_data.py

      - name: Generate embeddings
        run: python scripts/generate_embeddings.py

      - name: Upload to Cloudflare
        if: ${{ github.event.inputs.skip_upload != 'true' }}
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: python scripts/upload_to_cloudflare.py

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/rag-sources/ data/processed/rag_chunks.jsonl data/processed/*_stats.json
          if git diff --cached --quiet; then
            echo "No data changes detected."
          else
            git commit -m "chore: auto-update RAG data $(date +%Y-%m-%d)"
            git push
          fi
