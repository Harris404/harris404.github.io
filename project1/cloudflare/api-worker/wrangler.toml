name = "australian-assistant-api"
main = "src/worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Vectorize 向量数据库 (RAG)
[[vectorize]]
binding = "VECTORIZE"
index_name = "australian-rag"

# D1 文档数据库 (RAG)
[[d1_databases]]
binding = "DB"
database_name = "australian-rag-db"
database_id = "f67ebd35-cadd-4510-8ca6-1c217739df9c"

# KV 缓存 (对话历史 + API 缓存)
[[kv_namespaces]]
binding = "KV"
id = "2c9dde9856d940489b6b3ed6cbc6975e"

# AI (Cloudflare AI for embeddings)
[ai]
binding = "AI"

# Browser Rendering (Puppeteer for real Chrome execution)
[browser]
binding = "BROWSER"

[vars]
ENVIRONMENT = "production"
LLM_MODEL = "qwen-plus"
DASHSCOPE_BASE_URL = "https://dashscope-us.aliyuncs.com/compatible-mode/v1"
CF_ACCOUNT_ID = "bcd3fe230bd57d247df6d3e5637eca24"
USE_AI_GATEWAY = "false"
AI_GATEWAY_ID = "paris-404"

# Scheduled triggers
[triggers]
# Daily 20:00 UTC (06:00 AEST) — supermarket specials cache
# Weekly Sunday 18:00 UTC — RAG: scams
# Monthly 1st 16:00 UTC — RAG: visa, telco, student, finance, mentalhealth
# Quarterly 1st 14:00 UTC — RAG: rental, insurance, centrelink, travel, consumer
# Annual March 1st 12:00 UTC — RAG: schools, tax, super, housing, fairwork, driving, medicare, citizenship, licensing, pets
crons = [
  "0 20 * * *",
  "0 18 * * SUN",
  "0 16 1 * *",
  "0 14 1 1,4,7,10 *",
  "0 12 1 3 *"
]

# Module rules — treat XML files as text imports
[[rules]]
type = "Text"
globs = ["**/*.xml"]

# Secrets (通过 wrangler secret put 设置):
# wrangler secret put DEEPSEEK_API_KEY
# wrangler secret put NSW_TRANSPORT_API_KEY
# wrangler secret put GOOGLE_PLACES_API_KEY
# wrangler secret put VIC_TRANSPORT_TOKEN
# wrangler secret put CF_ACCOUNT_ID
# wrangler secret put TAVILY_API_KEY
