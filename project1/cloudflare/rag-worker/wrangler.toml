name = "australian-rag-worker"
main = "src/worker.js"
compatibility_date = "2024-01-01"

# Vectorize 向量数据库
[[vectorize]]
binding = "VECTORIZE"
index_name = "australian-rag"

# D1 文档数据库
[[d1_databases]]
binding = "DB"
database_name = "australian-rag-db"
database_id = "f67ebd35-cadd-4510-8ca6-1c217739df9c"

# AI for embeddings
[ai]
binding = "AI"

[vars]
ENVIRONMENT = "production"
